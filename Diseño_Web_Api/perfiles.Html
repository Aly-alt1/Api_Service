<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Perfiles</title>
    <link rel="stylesheet" href="DisenioWeb.css">
</head>
<body>
     <nav class="navbar">
        <a href="perfiles.html">Perfiles</a>
        <a href="direcciones.html">Direcciones</a>
        <a href="roles.html">Roles</a>
        <a href="usuarios.html">Usuarios</a>
        <a href="login.html">Cerrar Sesión</a>
    </nav>

    <div class="container">
        <div class="card">
            <h3>Registro Completo de Perfil</h3>
            <form id="perfilForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="nombre" placeholder="Nombre" required>
                    <input type="text" id="apellidoPaterno" placeholder="Apellido Paterno" required>
                    <input type="text" id="apellidoMaterno" placeholder="Apellido Materno" required>
                    <input type="text" id="rfc" placeholder="RFC" required>
                    <input type="date" id="fechaNacimiento" required title="Fecha de Nacimiento">
                    <input type="number" id="idUsuario" placeholder="ID Usuario Vinculado" required>
                </div>
                
                <h4>Dirección</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="calle" placeholder="Calle" required>
                    <input type="text" id="colonia" placeholder="Colonia" required>
                    <input type="text" id="numInt" placeholder="Núm. Interior">
                    <input type="text" id="numExt" placeholder="Núm. Exterior">
                    <input type="text" id="municipio" placeholder="Municipio" required>
                </div>

                <h4>Teléfono</h4>
                <input type="text" id="celular" placeholder="Celular (10 dígitos)" pattern="[0-9]{10}">
                <input type="text" id="casa" placeholder="Teléfono de casa (10 dígitos)" pattern="[0-9]{10}">
                <input type="text" id="oficina" placeholder="Teléfono de oficina (10 dígitos)" pattern="[0-9]{10}">
                
                <br><br>
                <button type="submit" class="btn-success">Guardar Registro Completo</button>
            </form>
        </div>

        <div class="card">
            <h3>Listado de Perfiles (Orden ASC por Cumpleaños)</h3>
            <table id="tablaPerfiles">
                <thead>
                    <tr>
                        <th>Nombre Completo</th>
                        <th>RFC</th>
                        <th>Cumpleaños</th>
                        <th>Dirección Principal</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="Perfiles.js"></script>
</body>
</html>
