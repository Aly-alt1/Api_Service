<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Roles</title>
    <link rel="stylesheet" href="DisenioWeb.css">
</head>
<body>
    <nav class="navbar">
        <a href="perfiles.html">Perfiles</a>
        <a href="direcciones.html">CRUD Direcciones</a>
        <a href="roles.html">Roles</a>
        <a href="usuarios.html">Usuarios</a>
        <a href="login.html">Cerrar Sesión</a>
    </nav>

    <div class="container">
        <div class="card">
            <h3>Gestión de Roles</h3>
            <form id="rolForm">
                <input type="hidden" id="idRol" value="0">
                <input type="text" id="strValor" placeholder="Nombre del Rol (Ej. Admin)" required>
                <input type="text" id="strDescripcion" placeholder="Descripción detallada" required style="width: 100%;">
                <button type="submit" class="btn-success" id="btnGuardar">Guardar Rol</button>
                <button type="button" class="btn-primary" onclick="resetForm()">Limpiar</button>
            </form>
        </div>

        <div class="card">
            <h3>Buscar Rol por Nombre</h3>
            <input type="text" id="searchNombre" placeholder="Ingrese nombre a buscar...">
            <button onclick="buscarRol()" class="btn-primary">Buscar</button>
            <button onclick="cargarRoles()" class="btn-success">Ver Todos</button>
        </div>

        <div class="card">
            <table id="tablaRoles">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre del Rol</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'https://localhost:44350/api/v1/Roles';

        async function cargarRoles() {
            const resp = await fetch(API_BASE);
            const data = await resp.json();
            renderTable(data);
        }

        async function buscarRol() {
            const valor = document.getElementById('searchNombre').value;
            if(!valor) return cargarRoles();
            const resp = await fetch(`${API_BASE}/nombre/${valor}`);
            if(resp.ok) {
                const data = await resp.json();
                renderTable(data ? [data] : []); // El API devuelve un objeto, lo ponemos en array
            } else {
                renderTable([]);
            }
        }

        function renderTable(data) {
            const tbody = document.querySelector('#tablaRoles tbody');
            tbody.innerHTML = '';
            data.forEach(r => {
                tbody.innerHTML += `
                    <tr>
                        <td>${r.IdRoles}</td>
                        <td>${r.StrValor}</td>
                        <td>${r.StrDescripcion}</td>
                        <td>
                            <button onclick="editar(${r.IdRoles}, '${r.StrValor}', '${r.StrDescripcion}')" class="btn-primary">Editar</button>
                            <button onclick="eliminar(${r.IdRoles})" class="btn-danger">Eliminar</button>
                        </td>
                    </tr>`;
            });
        }

        document.getElementById('rolForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = parseInt(document.getElementById('idRol').value);
            const dto = {
                IdRoles: id,
                StrValor: document.getElementById('strValor').value,
                StrDescripcion: document.getElementById('strDescripcion').value
            };

            const method = id === 0 ? 'POST' : 'PUT';
            const url = id === 0 ? `${API_BASE}/Create` : `${API_BASE}/${id}`;

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dto)
            });
            resetForm();
            cargarRoles();
        };

        function editar(id, valor, desc) {
            document.getElementById('idRol').value = id;
            document.getElementById('strValor').value = valor;
            document.getElementById('strDescripcion').value = desc;
            document.getElementById('btnGuardar').innerText = "Actualizar Rol";
        }

        async function eliminar(id) {
            if (confirm('¿Eliminar este rol del sistema?')) {
                await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
                cargarRoles();
            }
        }

        function resetForm() {
            document.getElementById('rolForm').reset();
            document.getElementById('idRol').value = "0";
            document.getElementById('btnGuardar').innerText = "Guardar Rol";
        }

        window.onload = cargarRoles;
    </script>
</body>
</html>
