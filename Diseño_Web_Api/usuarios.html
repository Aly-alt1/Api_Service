<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Usuarios</title>
    <link rel="stylesheet" href="DisenioWeb.css">
</head>
<body>
    <nav class="navbar">
        <a href="perfiles.html">Perfiles</a>
        <a href="direcciones.html">Direcciones</a>
        <a href="roles.html">Roles</a>
        <a href="usuarios.html">Usuarios</a>
        <a href="login.html">Cerrar Sesión</a>
    </nav>

    <div class="container">
        <div class="card">
            <h3>Gestión de Usuarios y Roles</h3>
            <form id="userForm">
                <input type="hidden" id="idUser" value="0">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="username" placeholder="Nombre de Usuario" required>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <div style="margin-top: 10px;">
                    <label><input type="checkbox" id="suspendido"> Usuario Suspendido</label>
                </div>
                
                <h4>Asignar Roles:</h4>
                <div id="rolesCheckboxes" style="margin-bottom: 15px; display:flex; gap: 15px; flex-wrap: wrap;"></div>

                <button type="submit" class="btn-success" id="btnGuardar">Guardar Usuario y Roles</button>
                <button type="button" class="btn-primary" onclick="resetForm()">Limpiar</button>
            </form>
        </div>

        <div class="card">
            <table id="tablaUsuarios">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Estado</th>
                        <th>Roles Asignados</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="Usuarios.js"></script>
</body>
</html>
