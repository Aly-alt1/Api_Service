<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario - Sistema</title>
    <link rel="stylesheet" href="DisenioWeb.css">
</head>
<body>
    <div class="container" style="max-width: 500px; margin-top: 50px;">
        <div class="card">
            <h2 style="text-align: center;">Crear Cuenta Nueva</h2>
            <p style="text-align: center; color: #666;">Ingrese sus datos para registrarse en el sistema.</p>
            
            <form id="registroForm">
                <div style="margin-bottom: 15px;">
                    <label for="username">Nombre de Usuario:</label>
                    <input type="text" id="username" placeholder="Ej. juan_perez" required style="width: 100%;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required style="width: 100%;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="confirmPassword">Confirmar Contraseña:</label>
                    <input type="password" id="confirmPassword" placeholder="Repita su contraseña" required style="width: 100%;">
                </div>

                <button type="submit" class="btn-success" style="width: 100%; font-size: 1.1rem;">Registrar Usuario</button>
            </form>

            <div style="margin-top: 20px; text-align: center;">
                <a href="login.html" style="color: var(--primary); text-decoration: none;">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://localhost:44350/api/v1/Usuarios/Create';

        document.getElementById('registroForm').onsubmit = async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            // Validación de coincidencia de contraseñas (Requerimiento de validaciones)
            if (pass !== confirmPass) {
                alert("Las contraseñas no coinciden. Por favor, verifíquelas.");
                return;
            }

            // Construcción del objeto según UsuarioDto
            const nuevoUsuario = {
                Username: username,
                Password: pass,
                Suspendido: false, // Por defecto, un usuario nuevo no está suspendido
                UsuarioRolDto: []  // Lista vacía si no se asignan roles en el registro inicial
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(nuevoUsuario)
                });

                if (response.ok) {
                    alert("¡Usuario creado exitosamente! Ahora puede iniciar sesión.");
                    window.location.href = 'login.html';
                } else {
                    const error = await response.text();
                    alert("Error al registrar: " + error);
                }
            } catch (err) {
                console.error("Error de conexión:", err);
                alert("No se pudo conectar con el servidor. Verifique que la API esté corriendo en el puerto 44350.");
            }
        };
    </script>
</body>
</html>
